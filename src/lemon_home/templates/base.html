<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Lemon Home{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css" />
    <link rel="stylesheet" href="/static/glightbox.min.css" />
    <script src="/static/htmx.min.js" defer></script>
    <script src="/static/glightbox.min.js" defer></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/">Lemon Home</a>
        <nav class="nav-tabs">
          <a class="nav-tab {% if nav_active == 'dashboard' %}active{% endif %}" href="/">总览</a>
          <a class="nav-tab {% if nav_active == 'houses' %}active{% endif %}" href="/houses">房屋管理</a>
          <a class="nav-tab {% if nav_active == 'contracts' %}active{% endif %}" href="/contracts">合同管理</a>
          <a class="nav-tab {% if nav_active == 'rent-calendar' %}active{% endif %}" href="/rent-calendar">收租总览</a>
        </nav>
      </header>

      {% if message %}
      <div class="notice success">{{ message }}</div>
      {% endif %}
      {% if error %}
      <div class="notice error">{{ error }}</div>
      {% endif %}

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
