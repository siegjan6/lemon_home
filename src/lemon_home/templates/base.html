<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Lemon Home{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/">Lemon Home</a>
        <nav class="nav">
          <a href="/">总览</a>
          <a href="/bills">账单中心</a>
          <a href="/houses/new">新增房屋</a>
        </nav>
      </header>

      {% if message %}
      <div class="notice success">{{ message }}</div>
      {% endif %}
      {% if error %}
      <div class="notice error">{{ error }}</div>
      {% endif %}

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
