{% extends "base.html" %}
{% block title %}新增房屋 - Lemon Home{% endblock %}
{% block content %}
<section class="section-head">
  <h1>新增房屋</h1>
  <p>先录整套房的基础信息。租约、租客、账单在房屋详情页继续补录。</p>
</section>

<form class="form-card" method="post" action="/houses">
  <label>
    <span>地址</span>
    <input name="address" type="text" required />
  </label>
  <div class="field-row">
    <label>
      <span>面积</span>
      <input name="area" type="number" step="0.1" min="0" required />
    </label>
    <label>
      <span>户型</span>
      <input name="layout" type="text" placeholder="例如 2室1厅1卫" />
    </label>
  </div>
  <div class="field-row">
    <label>
      <span>月租</span>
      <input name="monthly_rent" type="number" step="0.01" min="0" required />
    </label>
    <label>
      <span>押金</span>
      <input name="deposit" type="number" step="0.01" min="0" required />
    </label>
  </div>
  <button class="button primary" type="submit">创建房屋</button>
</form>
{% endblock %}
